<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简单加减法计算器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>简单加减法计算器</h2>
    
    <input type="number" id="num1" placeholder="请输入第一个数">
    <input type="number" id="num2" placeholder="请输入第二个数">

    <div class="buttons">
      <button onclick="add()">加法 +</button>

  <script src="script.js"></script>
